<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${emp.fullName} + ' | Hồ sơ nhân viên'">Hồ sơ nhân viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        "background-dark": "#121821",
                        "slate-card": "#1e2632",
                        "slate-border": "#2d3949"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(30,38,50, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .bg-gradient-mesh {
            background-color: #121821;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(217,70%,30%,1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(217,100%,15%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(217,70%,30%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="bg-gradient-mesh text-slate-100 min-h-screen transition-colors duration-300">
    <!-- Navbar (Simplified) -->
    <nav class="sticky top-0 z-50 glass border-b border-slate-border px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="/employees" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800 text-slate-400 hover:text-primary transition-all">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-blue-400 bg-clip-text text-transparent">Quản lý nhân sự</h1>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <!-- Profile Header Card -->
        <div class="glass rounded-3xl p-8 mb-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary/10 rounded-full -mr-32 -mt-32 blur-3xl"></div>
            
            <div class="relative flex flex-col md:flex-row items-center gap-8">
                <!-- Avatar -->
                <div class="relative group">
                    <div class="w-32 h-32 md:w-40 md:h-40 rounded-3xl overflow-hidden border-4 border-slate-800 shadow-2xl bg-slate-700 flex items-center justify-center">
                        <img th:if="${emp.avatarUrl}" th:src="${emp.avatarUrl}" alt="Avatar" class="w-full h-full object-cover">
                        <span th:unless="${emp.avatarUrl}" class="text-4xl font-bold text-slate-400" th:text="${#strings.substring(emp.fullName,0,1)}">A</span>
                    </div>
                </div>

                <div class="flex-1 text-center md:text-left">
                    <h2 class="text-3xl font-extrabold text-white" th:text="${emp.fullName}">Nguyễn Văn A</h2>
                    <p class="text-lg text-primary font-semibold mt-1" th:text="${emp.position}">Software Engineer</p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4 mt-4">
                        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800/50 text-sm font-medium border border-slate-700">
                            <span class="material-symbols-outlined text-sm text-slate-400">corporate_fare</span>
                            <span th:text="${emp.departmentName}">Phòng Công Nghệ</span>
                        </div>
                        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800/50 text-sm font-medium border border-slate-700">
                            <span class="material-symbols-outlined text-sm text-slate-400">mail</span>
                            <span th:text="${emp.email}">example@mail.com</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Details Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sidebar Info -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Thông tin hệ thống</h3>
                    <div class="space-y-4">
                        <div>
                            <p class="text-xs text-slate-400 mb-1">Ngày gia nhập</p>
                            <p class="font-semibold text-slate-200" th:text="${emp.joinDate != null ? emp.joinDate : 'N/A'}">2024-01-01</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 mb-1">Vai trò hệ thống</p>
                            <span class="inline-block px-2 py-1 rounded bg-blue-900/30 text-blue-400 text-xs font-bold" th:text="${emp.role}">EMPLOYEE</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Form -->
            <div class="lg:col-span-2">
                <div class="glass rounded-2xl p-8">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-xl font-bold text-white">Thông tin cá nhân</h3>
                        <span th:if="${isOwner}" class="px-3 py-1 bg-green-900/30 text-green-400 text-xs font-bold rounded-full">Đây là hồ sơ của bạn</span>
                    </div>

                    <form id="profileForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Read Only Fields -->
                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-slate-400">Họ và tên</label>
                                <input type="text" th:value="${emp.fullName}" disabled class="w-full px-4 py-2.5 rounded-xl bg-slate-800/50 border border-slate-700 text-slate-500 cursor-not-allowed outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-slate-400">Email công việc</label>
                                <input type="email" th:value="${emp.email}" disabled class="w-full px-4 py-2.5 rounded-xl bg-slate-800/50 border border-slate-700 text-slate-500 cursor-not-allowed outline-none">
                            </div>
                            
                            <!-- Editable for Owner -->
                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-slate-300">Số điện thoại</label>
                                <input type="text" name="phone" th:value="${emp.phone}" th:disabled="${!isOwner}"
                                       class="w-full px-4 py-2.5 rounded-xl transition-all focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                                       th:classappend="${isOwner ? 'bg-slate-800 border-slate-600 text-white' : 'bg-slate-800/50 border-slate-700 text-slate-500'}">
                            </div>

                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-slate-300">Giới tính</label>
                                <select name="gender" th:disabled="${!isOwner}"
                                        class="w-full px-4 py-2.5 rounded-xl transition-all focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none"
                                        th:classappend="${isOwner ? 'bg-slate-800 border-slate-600 text-white' : 'bg-slate-800/50 border-slate-700 text-slate-500'}">
                                    <option value="MALE" th:selected="${emp.gender == 'MALE'}">Nam</option>
                                    <option value="FEMALE" th:selected="${emp.gender == 'FEMALE'}">Nữ</option>
                                    <option value="OTHER" th:selected="${emp.gender == 'OTHER'}">Khác</option>
                                </select>
                            </div>

                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-slate-300">Ngày sinh</label>
                                <input type="date" name="dateOfBirth" th:value="${emp.dateOfBirth}" th:disabled="${!isOwner}"
                                       class="w-full px-4 py-2.5 rounded-xl transition-all focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                                       th:classappend="${isOwner ? 'bg-slate-800 border-slate-600 text-white' : 'bg-slate-800/50 border-slate-700 text-slate-500'}">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-300">Địa chỉ hiện tại</label>
                            <textarea name="address" th:text="${emp.address}" th:disabled="${!isOwner}" rows="3"
                                      class="w-full px-4 py-2.5 rounded-xl transition-all focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none resize-none"
                                      th:classappend="${isOwner ? 'bg-slate-800 border-slate-600 text-white' : 'bg-slate-800/50 border-slate-700 text-slate-500'}"></textarea>
                        </div>

                        <div th:if="${isOwner}" class="flex justify-end pt-4">
                            <button type="button" onclick="saveProfile()" 
                                    class="px-8 py-3 bg-primary text-white font-bold rounded-xl hover:shadow-lg hover:shadow-primary/30 transition-all active:scale-95">
                                Lưu thay đổi
                            </button>
                        </div>
                </div>

                <!-- Change Password -->
                <div th:if="${isOwner}" class="glass rounded-2xl p-8 mt-8 border border-amber-500/10">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="material-symbols-outlined text-amber-500">lock_reset</span>
                        <h3 class="text-xl font-bold text-white uppercase tracking-tight">Đổi mật khẩu</h3>
                    </div>
                    <form id="passwordForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Mật khẩu hiện tại</label>
                                <input type="password" name="oldPassword" required class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-white/10 text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-600">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Mật khẩu mới</label>
                                <input type="password" name="newPassword" required class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-white/10 text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-600">
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="button" onclick="changePassword()" 
                                    class="px-8 py-3 bg-amber-600/20 text-amber-500 border border-amber-500/30 font-black text-[10px] uppercase tracking-widest rounded-xl hover:bg-amber-600 hover:text-white transition-all active:scale-95">
                                Cập nhật mật khẩu ngay
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 px-6 py-3 rounded-2xl glass shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 z-[100] flex items-center gap-3">
        <span id="toastIcon" class="material-symbols-outlined"></span>
        <span id="toastMessage" class="font-semibold px-2"></span>
    </div>

    <script th:inline="javascript">
        const empId = /*[[${emp.id}]]*/ 0;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            msg.innerText = message;
            if(type === 'success') {
                icon.innerText = 'check_circle';
                icon.className = 'material-symbols-outlined text-green-500';
            } else {
                icon.innerText = 'error';
                icon.className = 'material-symbols-outlined text-red-500';
            }
            
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }

        async function saveProfile() {
            const form = document.getElementById('profileForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch(`/api/employees/${empId}/personal`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast('Cập nhật hồ sơ thành công!');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    try {
                        const err = await response.json();
                        showToast(err.message || 'Lỗi khi cập nhật hồ sơ', 'error');
                    } catch (e) {
                         showToast('Lỗi khi cập nhật hồ sơ', 'error');
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Lỗi hệ thống!', 'error');
            }
        }

        async function changePassword() {
            const form = document.getElementById('passwordForm');
            const data = Object.fromEntries(new FormData(form).entries());
            
            if (!data.oldPassword || !data.newPassword) {
                showToast('Vui lòng nhập đầy đủ thông tin', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/auth/change-password?employeeId=${empId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast('Đổi mật khẩu thành công!');
                    form.reset();
                } else {
                    const err = await response.json();
                    showToast(err.message || 'Mật khẩu cũ không chính xác', 'error');
                }
            } catch (error) {
                showToast('Lỗi hệ thống!', 'error');
            }
        }
    </script>
</body>
</html>
