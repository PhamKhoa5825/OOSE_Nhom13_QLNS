<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HR Manager Pro - Chờ phê duyệt</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4e8ce4",
                        "background-dark": "#121821",
                        "slate-card": "#1e2632",
                        "slate-border": "#2d3949"
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 38, 50, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-gradient-mesh {
            background-color: #121821;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(217,70%,30%,1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(217,100%,15%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(217,70%,30%,1) 0, transparent 50%);
        }
        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }
        .pulse-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: inherit;
            animation: pulse-ring 2.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
    </style>
</head>
<body class="bg-gradient-mesh text-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md space-y-10 animate-in fade-in zoom-in duration-500 text-center">
        <!-- Icon & Status -->
        <div class="relative inline-flex mb-4">
            <div class="size-24 rounded-3xl bg-amber-500/10 border-2 border-amber-500/20 flex items-center justify-center text-amber-500 shadow-2xl shadow-amber-500/10">
                <span class="material-symbols-outlined text-5xl animate-pulse">hourglass_top</span>
            </div>
            <div class="absolute -top-2 -right-2 bg-rose-500 size-6 rounded-full border-4 border-background-dark flex items-center justify-center">
                <span class="material-symbols-outlined text-[10px] text-white font-black">lock</span>
            </div>
        </div>

        <div class="space-y-4">
            <h1 class="text-3xl font-black tracking-tight">Đang chờ phê duyệt</h1>
            <p class="text-slate-400 font-medium leading-relaxed px-4">
                Tài khoản của bạn đã được đăng ký thành công nhưng đang ở trạng thái <span class="text-amber-500 font-bold">Chờ duyệt</span>.
            </p>
            <div class="bg-slate-800/40 border border-slate-700/50 p-6 rounded-3xl text-sm text-slate-300 space-y-3 mx-4">
                <p>Vui lòng liên hệ với <span class="text-primary font-bold">Quản trị viên</span> để kích hoạt tài khoản.</p>
                <div class="flex items-center justify-center gap-4 pt-2">
                    <div class="flex items-center gap-1.5 text-xs text-slate-500">
                        <span class="material-symbols-outlined text-base">mail</span>
                        <span>admin@hrpro.com</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex flex-col gap-4 px-4 pt-4">
            <button onclick="window.location.reload()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 border border-slate-700">
                <span class="material-symbols-outlined text-xl">refresh</span>
                <span>KIỂM TRA LẠI</span>
            </button>
            <button onclick="logout()" class="w-full text-slate-500 hover:text-rose-500 font-bold py-2 transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">logout</span>
                <span>ĐĂNG XUẤT</span>
            </button>
        </div>
    </div>

    <script>
        function logout() {
            document.cookie = "jwt=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = '/login';
        }
    </script>
</body>
</html>
